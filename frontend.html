<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LendFlow — Loan Management</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b2b;
    --border: #1e2540;
    --accent: #4f8dff;
    --accent2: #7c5cfc;
    --green: #00d084;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --text: #e8eaf6;
    --muted: #5a6480;
    --card-glow: rgba(79,141,255,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    gap: 8px;
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.2s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(79,141,255,0.12); color: var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .page-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .api-badge {
    background: rgba(0,208,132,0.1);
    color: var(--green);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(0,208,132,0.2);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .content { flex: 1; padding: 32px; overflow-y: auto; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 14px 14px 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stat-card:hover { border-color: rgba(79,141,255,0.3); }
  .stat-card:hover::before { opacity: 1; }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }

  /* Panels */
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .panel-body { padding: 24px; }

  /* Form */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  .eligibility-hint {
    font-size: 12px; color: var(--muted); margin-top: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .eligibility-hint.ok { color: var(--green); }
  .eligibility-hint.warn { color: var(--red); }

  .btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Toast */
  .toast-container { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    animation: slideIn 0.3s ease;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.success { border-color: rgba(0,208,132,0.3); }
  .toast.error { border-color: rgba(255,77,109,0.3); }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  /* Table */
  .loan-table { width: 100%; border-collapse: collapse; }
  .loan-table th {
    text-align: left; padding: 10px 14px;
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .loan-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid rgba(30,37,64,0.5); }
  .loan-table tr:last-child td { border-bottom: none; }
  .loan-table tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
  }
  .badge.PENDING { background: rgba(255,209,102,0.12); color: var(--yellow); border: 1px solid rgba(255,209,102,0.2); }
  .badge.APPROVED { background: rgba(0,208,132,0.1); color: var(--green); border: 1px solid rgba(0,208,132,0.2); }
  .badge.REJECTED { background: rgba(255,77,109,0.1); color: var(--red); border: 1px solid rgba(255,77,109,0.2); }

  .action-btns { display: flex; gap: 6px; }
  .action-btn {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; border: 1px solid; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .action-btn.approve { background: rgba(0,208,132,0.08); color: var(--green); border-color: rgba(0,208,132,0.2); }
  .action-btn.approve:hover { background: rgba(0,208,132,0.18); }
  .action-btn.reject { background: rgba(255,77,109,0.08); color: var(--red); border-color: rgba(255,77,109,0.2); }
  .action-btn.reject:hover { background: rgba(255,77,109,0.18); }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  .empty-state .big { font-size: 32px; margin-bottom: 10px; }

  .amount { font-family: 'Syne', sans-serif; font-weight: 600; }

  /* API URL bar */
  .api-url-bar {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    font-family: monospace; font-size: 12px; color: var(--muted);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .method-tag {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
  }
  .method-tag.POST { background: rgba(79,141,255,0.15); color: var(--accent); }
  .method-tag.GET { background: rgba(0,208,132,0.12); color: var(--green); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">💸</div>
    LendFlow
  </div>
  <button class="nav-item active"><span class="icon">🏠</span> Dashboard</button>
  <button class="nav-item"><span class="icon">📋</span> Applications</button>
  <button class="nav-item"><span class="icon">✅</span> Approvals</button>
  <button class="nav-item"><span class="icon">📊</span> Analytics</button>
  <button class="nav-item"><span class="icon">⚙️</span> Settings</button>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">Loan Management</div>
    <div class="api-badge">
      <span class="dot"></span>
      API Connected — localhost:8000
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Applications</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value yellow" id="stat-pending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Approved</div>
        <div class="stat-value green" id="stat-approved">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rejected</div>
        <div class="stat-value red" id="stat-rejected">0</div>
      </div>
    </div>

    <div class="panels">
      <!-- Submit Form -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">New Application</div>
          <div class="api-url-bar" style="margin:0;padding:4px 10px;">
            <span class="method-tag POST">POST</span>/loans
          </div>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label>Applicant Name</label>
            <input type="text" id="name" placeholder="e.g. Rahul Kumar" />
          </div>
          <div class="form-group">
            <label>Monthly Income (₹)</label>
            <input type="number" id="income" placeholder="e.g. 50000" min="1" oninput="updateHint()" />
          </div>
          <div class="form-group">
            <label>Loan Amount (₹)</label>
            <input type="number" id="loan_amount" placeholder="e.g. 200000" min="1" oninput="updateHint()" />
            <div class="eligibility-hint" id="eligibility-hint">Enter income to see max eligibility</div>
          </div>
          <button class="btn" id="submit-btn" onclick="submitLoan()">Submit Application</button>
        </div>
      </div>

      <!-- Applications Table -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">All Applications</div>
          <div class="api-url-bar" style="margin:0;padding:4px 10px;">
            <span class="method-tag GET">GET</span>/loans
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div id="table-container">
            <div class="empty-state">
              <div class="big">📄</div>
              No applications yet. Submit one to get started.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<script>
const API = 'http://localhost:8000';

function updateHint() {
  const income = parseFloat(document.getElementById('income').value) || 0;
  const amount = parseFloat(document.getElementById('loan_amount').value) || 0;
  const hint = document.getElementById('eligibility-hint');
  if (!income) { hint.textContent = 'Enter income to see max eligibility'; hint.className = 'eligibility-hint'; return; }
  const max = income * 10;
  if (amount && amount > max) {
    hint.textContent = `⚠ Exceeds limit. Max eligible: ₹${max.toLocaleString('en-IN')}`;
    hint.className = 'eligibility-hint warn';
  } else {
    hint.textContent = `✓ Max eligible: ₹${max.toLocaleString('en-IN')}`;
    hint.className = 'eligibility-hint ok';
  }
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function submitLoan() {
  const name = document.getElementById('name').value.trim();
  const income = parseFloat(document.getElementById('income').value);
  const loan_amount = parseFloat(document.getElementById('loan_amount').value);
  if (!name || !income || !loan_amount) { toast('Fill all fields', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';

  try {
    const res = await fetch(`${API}/loans`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({applicant_name: name, income, loan_amount})
    });
    const data = await res.json();
    if (!res.ok) { toast(data.detail || 'Submission failed', 'error'); return; }
    toast(`Application #${data.id} submitted for ${data.applicant_name}`);
    document.getElementById('name').value = '';
    document.getElementById('income').value = '';
    document.getElementById('loan_amount').value = '';
    document.getElementById('eligibility-hint').textContent = 'Enter income to see max eligibility';
    document.getElementById('eligibility-hint').className = 'eligibility-hint';
    loadLoans();
  } catch(e) {
    toast('Cannot reach API — is uvicorn running?', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Application';
  }
}

async function approveLoan(id) {
  try {
    const res = await fetch(`${API}/loans/${id}/approve`, {method:'PUT'});
    const data = await res.json();
    if (!res.ok) { toast(data.detail, 'error'); return; }
    toast(`Loan #${id} approved ✓`);
    loadLoans();
  } catch(e) { toast('API error', 'error'); }
}

async function rejectLoan(id) {
  try {
    const res = await fetch(`${API}/loans/${id}/reject`, {method:'PUT'});
    const data = await res.json();
    if (!res.ok) { toast(data.detail, 'error'); return; }
    toast(`Loan #${id} rejected`, 'error');
    loadLoans();
  } catch(e) { toast('API error', 'error'); }
}

async function loadLoans() {
  try {
    const res = await fetch(`${API}/loans`);
    if (!res.ok) return;
    const loans = await res.json();

    // update stats
    document.getElementById('stat-total').textContent = loans.length;
    document.getElementById('stat-pending').textContent = loans.filter(l=>l.status==='PENDING').length;
    document.getElementById('stat-approved').textContent = loans.filter(l=>l.status==='APPROVED').length;
    document.getElementById('stat-rejected').textContent = loans.filter(l=>l.status==='REJECTED').length;

    const container = document.getElementById('table-container');
    if (loans.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="big">📄</div>No applications yet. Submit one to get started.</div>`;
      return;
    }

    container.innerHTML = `
      <table class="loan-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Applicant</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          ${loans.map(l => `
            <tr>
              <td style="color:var(--muted)">${l.id}</td>
              <td>${l.applicant_name}</td>
              <td><span class="amount">₹${l.loan_amount.toLocaleString('en-IN')}</span></td>
              <td><span class="badge ${l.status}">${l.status}</span></td>
              <td>
                <div class="action-btns">
                  <button class="action-btn approve" onclick="approveLoan(${l.id})" ${l.status!=='PENDING'?'disabled':''}>Approve</button>
                  <button class="action-btn reject" onclick="rejectLoan(${l.id})" ${l.status!=='PENDING'?'disabled':''}>Reject</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    // API not running
  }
}

// Auto-refresh every 5 seconds
loadLoans();
setInterval(loadLoans, 5000);
</script>
</body>
</html>
